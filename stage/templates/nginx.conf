# AWS VPC DNS resolver — required for Cloud Map DNS resolution at runtime.
# Without this, Nginx caches the upstream IP at startup and won't pick up
# new task IPs after a deploy or scaling event.
resolver 169.254.169.253 valid=10s;

server {
    listen 80;

    location / {
        # Cloud Map registers the internal-tool task IP under this DNS name.
        # Using a variable forces Nginx to re-resolve via the resolver above.
        set $upstream http://internal-tool.myapp.internal;
        proxy_pass $upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
